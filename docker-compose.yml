services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend-smoke:
    image: python:3.12-slim
    profiles:
      - check
    depends_on:
      backend:
        condition: service_healthy
    command:
      [
        "python",
        "-c",
        "import urllib.request; print(urllib.request.urlopen('http://backend:8000/api/health', timeout=10).read().decode())"
      ]

  extension-builder:
    build:
      context: .
      dockerfile: Dockerfile.extension
    profiles:
      - build
    depends_on:
      backend:
        condition: service_healthy
    volumes:
      - "${EXTENSION_OUTPUT_DIR:-./docker-dist}:/output"
